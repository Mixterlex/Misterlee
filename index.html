<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>Misterlee</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />

<style>
body{
  font-family: 'Noto Sans Thai', sans-serif;
  margin:0;
  background:#111;
  color:white;
  text-align:center;
}
header{
  padding:20px;
}
.ar-section{
  padding:20px;
}
.ar-button{
  margin-top:15px;
  padding:12px 24px;
  font-size:16px;
  background:#00ff88;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}
.ar-button:hover{
  background:#00cc6a;
}
footer{
  margin-top:40px;
  padding:20px;
  background:#000;
}
footer a{
  color:#00ff88;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <div class="main-title">ThreeandD</div>
  <div class="sub-title">3D (AR)</div>
</header>

<!-- Raptor Section -->
<div class="ar-section">

  <div class="head-title">Raptor</div>
  <div class="sub-title">First model 3D</div>

  <model-viewer
      id="model1"
      src="AR.glb"
      ios-src="AR.usdz"
      alt="3D Raptor Model"
      ar
      ar-modes="scene-viewer webxr quick-look"
      ar-placement="floor"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      exposure="1"
      environment-image="neutral"
      loading="eager"
      reveal="auto"
      style="width:100%; height:450px;">

  </model-viewer>

  <button class="ar-button" onclick="triggerAR('model1')">
    Play AR
  </button>

</div>

<footer>
  <div><strong>Instagram:</strong>
    <a href="https://www.instagram.com/mixter.lex_/" target="_blank">
      instagram.com/mixter.lex_
    </a>
  </div>
</footer>

<!-- โหลด model-viewer -->
<script type="module"
  src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<script>
function triggerAR(id){
  const viewer = document.getElementById(id);

  if (!viewer) return;

  if (viewer.canActivateAR) {
    viewer.activateAR();
  } else {
    alert("อุปกรณ์หรือ Browser นี้ไม่รองรับ AR\nลองกดปุ่ม AR ที่มุมขวาของโมเดลแทน");
  }
}
</script>

</body>
</html>
